{% extends "courses/base.html" %}
{% block title %}Set your password{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card">
      <div class="card-body">
        <h5 class="mb-3">Set a password</h5>
        <form method="post">
          {% csrf_token %}
          {{ form.non_field_errors }}
          <div class="mb-3">
            {{ form.new_password1.label_tag }}
            {{ form.new_password1 }}
          </div>
          <div class="mb-3">
            {{ form.new_password2.label_tag }}
            {{ form.new_password2 }}
          </div>
          <div class="d-grid">
            <button class="btn btn-primary">Set password</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
