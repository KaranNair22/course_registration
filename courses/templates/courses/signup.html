{% extends "courses/base.html" %}
{% block title %}Create Account{% endblock %}

{% block hero %}
<section class="fp-hero py-4">
  <div class="container">
    <h2 class="fw-semibold mb-1">Create your student account</h2>
    <p class="text-secondary mb-0">Already registered? <a href="/admin/login/">Log in here</a>.</p>
  </div>
</section>
{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7 col-lg-5">
    <div class="card">
      <div class="card-body">
        <h5 class="mb-3">Sign up</h5>
        <form method="post">
          {% csrf_token %}
          {% if next %}
            <input type="hidden" name="next" value="{{ next }}">
          {% endif %}
          <div class="mb-3">
            <label class="form-label">First name</label>
            <input class="form-control fp-input" name="first_name" placeholder="First name">
          </div>
          <div class="mb-3">
            <label class="form-label">Last name</label>
            <input class="form-control fp-input" name="last_name" placeholder="Last name">
          </div>
          <div class="mb-3">
            <label class="form-label">Email *</label>
            <input required class="form-control fp-input" name="email" placeholder="you@example.com" type="email">
          </div>
          <div class="mb-3">
            <label class="form-label">Password *</label>
            <input required class="form-control fp-input" name="password" type="password" placeholder="Create a password">
          </div>
          <div class="d-grid">
            <button class="btn btn-primary">Create account</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
